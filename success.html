<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অর্ডার সফল</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }

        h1 {
            color: #28a745;
            font-size: 35px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 12px;
            color: #333;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #20ba5a;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>✅ অর্ডার সফল</h1>
        <p>আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে।</p>
        <p>📞 আমাদের প্রতিনিধি খুব শীঘ্রই <strong>01914743828</strong> নম্বর থেকে আপনার সাথে যোগাযোগ করবে।</p>
        <p>🚚 আপনার অর্ডার প্রসেসিং শুরু হয়েছে।</p>
        <a href="index.html" class="btn">হোম পেজে ফিরে যান</a>
    </div>

</body>
</html>
